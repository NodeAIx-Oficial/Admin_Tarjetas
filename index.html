<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDS Admin – Tarjetas</title>
<style>
  :root {
    --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e29;
    --border: rgba(255,255,255,0.07); --accent: #3b82f6;
    --text: #f1f5f9; --text2: #94a3b8; --text3: #475569;
    --green: #10b981; --red: #ef4444; --gold: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  /* ---- LOGIN ---- */
  #login-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; z-index: 999;
  }
  #login-screen h2 { font-size: 22px; font-weight: 800; letter-spacing: 2px; }
  #login-screen h2 span { color: var(--accent); }
  #login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 36px 40px; display: flex; flex-direction: column; gap: 14px; width: 320px; }
  #login-box label { font-size: 12px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  #login-box input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 15px; outline: none; width: 100%; }
  #login-box input:focus { border-color: var(--accent); }
  #btn-login { background: var(--accent); color: white; border: none; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
  #btn-login:hover { opacity: 0.85; }
  #login-error { color: var(--red); font-size: 13px; text-align: center; display: none; }

  /* ---- ADMIN PANEL ---- */
  #admin-panel { display: none; width: 100%; max-width: 1100px; padding: 32px 24px; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; width: 100%; position: sticky; top: 0; z-index: 50; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #3b82f6, #10b981); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo h1 { font-size: 16px; font-weight: 700; }
  .badge-admin { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }

  .panel-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .panel-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }

  #status-msg { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; }
  #status-msg.info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
  #status-msg.ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  #status-msg.err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }

  #btn-generar { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: white; border: none; padding: 12px 28px; border-radius: 9px; font-size: 14px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 32px; }
  #btn-generar:hover { opacity: 0.88; }
  #btn-generar:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ---- GRID DE TARJETAS ---- */
  .cards-grid { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
  .card-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .card-wrap canvas { border-radius: 16px; box-shadow: 0 8px 48px rgba(0,0,0,0.7); }
  .card-wrap .match-label { font-size: 12px; color: var(--text2); font-weight: 600; }
  .btn-dl { background: var(--green); color: white; border: none; padding: 9px 20px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 700; }
  .btn-dl:hover { opacity: 0.85; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>Bet_<span>Data_</span>Science</h2>
  <div id="login-box">
    <label for="pwd">Contraseña de acceso</label>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()" />
    <button id="btn-login" onclick="doLogin()">Entrar</button>
    <p id="login-error">Contraseña incorrecta.</p>
  </div>
</div>

<!-- ADMIN -->
<header style="display:none;" id="admin-header">
  <div class="logo">

// ============================================================
// LOGIN
// ============================================================
function doLogin() {
  const val = document.getElementById('pwd').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-header').style.display = 'flex';
    document.getElementById('admin-panel').style.display = 'block';
    loadAndGenerate();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

// ============================================================
// CARGA CSV
// ============================================================
function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg; el.className = type; el.style.display = 'block';
}

async function loadAndGenerate() {
  setStatus('⏳ Cargando datos del CSV…', 'info');
  try {
    const resp = await fetch(CSV_URL + '&_t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);
    const pendientes = rows
      .map(r => {
        const aciertoRaw = (r['acierto'] || '').toLowerCase();
        const resultado = r['resultado'] || '';
        let estado = 'pendiente';
        if (aciertoRaw === 'true' || aciertoRaw === 'si') estado = 'si';
        else if (resultado.trim() && resultado.trim() !== '—') estado = 'no';
        return {
          fecha: r['fecha'] || '',
          liga: r['liga'] || 'Liga',
          local: r['local'] || 'Local',
          visitante: r['visitante'] || 'Visitante',
          prono: r['recomendacion'] || '—',
          conf: r['%'] || '0%',
          mercado: r['mercado'] || 'Mercado Ganador',
          acierto: estado
        };
      })
      .filter(d => d.acierto === 'pendiente');

    if (!pendientes.length) {
      setStatus('No hay partidos pendientes en el CSV.', 'err'); return;
    }
    setStatus(`✅ ${pendientes.length} partido(s) pendiente(s) cargado(s). Pulsa "Generar tarjetas".`, 'ok');
    window._pendientes = pendientes;
  } catch(e) {
    setStatus('Error cargando CSV: ' + e.message, 'err');
  }
}

function generarTarjetas() {
  const data = window._pendientes;
  if (!data || !data.length) { setStatus('Primero carga los datos.', 'err'); return; }
  const btn = document.getElementById('btn-generar');
  btn.disabled = true; btn.textContent = '⏳ Generando…';
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  const logo = new Image();
  logo.src = LOGO_DATA_URI;

  const buildAll = () => {
    data.forEach((d) => {
      const canvas = drawCard(d, logo.complete && logo.naturalWidth ? logo : null);
      const slug = (d.local + '_vs_' + d.visitante).replace(/\s+/g,'_');
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';

      const preview = document.createElement('canvas');
      preview.width = 270; preview.height = 480;
      const pctx = preview.getContext('2d');
      pctx.drawImage(canvas, 0, 0, 270, 480);
      preview.style.borderRadius = '14px';

      const label = document.createElement('div');
      label.className = 'match-label';
      label.textContent = d.local + ' vs ' + d.visitante;

      const btn2 = document.createElement('button');
      btn2.className = 'btn-dl';
      btn2.textContent = '⬇ Descargar PNG';
      btn2.onclick = () => {
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = 'BDS_' + slug + '.png';
        a.click();
      };

      wrap.appendChild(preview);
      wrap.appendChild(label);
      wrap.appendChild(btn2);
      grid.appendChild(wrap);
    });

    btn.disabled = false; btn.textContent = '⚡ Generar tarjetas';
    setStatus('✅ ' + data.length + ' tarjeta(s) generada(s). Descárgalas abajo.', 'ok');
  };

  logo.onload  = buildAll;
  logo.onerror = buildAll;
}

// ============================================================
// DIBUJO DE TARJETA CON CANVAS API — 1080 × 1920 px
// ============================================================
function drawCard(d) {
  const W = 1080, H = 1920;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── FONDO base azul oscuro igual al ejemplo ──────────────
  ctx.fillStyle = '#0d1f4e';
  ctx.fillRect(0, 0, W, H);

  // Degradado radial central ligeramente más claro
  const gCenter = ctx.createRadialGradient(W/2, H*0.42, 0, W/2, H*0.42, 780);
  gCenter.addColorStop(0,   'rgba(22,58,130,0.70)');
  gCenter.addColorStop(0.6, 'rgba(13,31,78,0.40)');
  gCenter.addColorStop(1,   'rgba(5,10,30,0)');
  ctx.fillStyle = gCenter;
  ctx.fillRect(0, 0, W, H);

  // Brillo sutil esquina superior derecha
  const gTR = ctx.createRadialGradient(W*0.9, 0, 0, W*0.9, 0, 500);
  gTR.addColorStop(0, 'rgba(56,120,255,0.18)');
  gTR.addColorStop(1, 'rgba(56,120,255,0)');
  ctx.fillStyle = gTR;
  ctx.fillRect(0, 0, W, H);

  // ── MARCA BET_DATA_SCIENCE ───────────────────────────────
  drawBrand(ctx, W/2, 260, 88);

  // ── BADGE LIGA ───────────────────────────────────────────
  drawPill(ctx, W/2, 400, (d.liga || 'LIGA').toUpperCase(),
           '#1a50c8', '#2563eb', 'white', 34, 80, 420);

  // ── BLOQUE CENTRAL BLANCO (contenedor equipos + info) ───
  const blockX = 60, blockW = W - 120;
  const blockY = 520, blockH = 820;
  const blockR  = 32;

  // Sombra del bloque
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur  = 60;
  ctx.shadowOffsetY = 12;
  ctx.fillStyle = '#0d2260';
  roundRect(ctx, blockX, blockY, blockW, blockH, blockR); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // Borde sutil del bloque
  ctx.strokeStyle = 'rgba(80,130,255,0.25)'; ctx.lineWidth = 2;
  roundRect(ctx, blockX, blockY, blockW, blockH, blockR); ctx.stroke();

  // ── ROW EQUIPOS ─────────────────────────────────────────
  const teamY    = blockY + 60;
  const teamH    = 190;
  const teamW    = 430;
  const teamGap  = 60;   // espacio para VS en el centro
  const teamLX   = blockX + 40;
  const teamRX   = blockX + blockW - 40 - teamW;

  drawTeamBox(ctx, teamLX, teamY, teamW, teamH, d.local     || 'LOCAL',     false);
  drawTeamBox(ctx, teamRX, teamY, teamW, teamH, d.visitante || 'VISITANTE', true);
  drawVsBadge(ctx, W/2, teamY + teamH/2, 56);

  // ── SEPARADOR ────────────────────────────────────────────
  const sepY = teamY + teamH + 50;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(blockX+60, sepY); ctx.lineTo(blockX+blockW-60, sepY); ctx.stroke();

  // ── TRES CAJAS INFO ──────────────────────────────────────
  const infoY   = sepY + 40;
  const infoH   = 220;
  const infoGap = 24;
  const infoW   = (blockW - 80 - infoGap*2) / 3;
  const infoX0  = blockX + 40;

  drawInfoBox(ctx, infoX0,                  infoY, infoW, infoH,
              'MERCADO',        d.mercado || 'Mercado Ganador', 'white',   30);
  drawInfoBox(ctx, infoX0 + infoW + infoGap,  infoY, infoW, infoH,
              'RECOMENDACIÓN',  d.prono   || '—',               '#60a5fa', 64);
  drawInfoBox(ctx, infoX0 + (infoW+infoGap)*2, infoY, infoW, infoH,
              'PROBABILIDAD',   d.conf    || '—',               '#34d399', 64);

  // ── FECHA ────────────────────────────────────────────────
  const fechaY = infoY + infoH + 60;
  if (d.fecha) {
    // Icono calendario (simple rectángulo)
    const iconSize = 36;
    const iconX = W/2 - ctx.measureText(formatFecha(d.fecha)).width/2 - iconSize - 14;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, iconX, fechaY - iconSize*0.8, iconSize, iconSize, 6); ctx.fill();
    ctx.fillStyle = 'white'; ctx.font = '700 20px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('📅', iconX + iconSize/2, fechaY - iconSize*0.8 + 26);

    ctx.fillStyle = 'rgba(180,200,255,0.75)';
    ctx.font = '600 34px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(formatFecha(d.fecha), W/2 + 14, fechaY);
  }

  // ── FOOTER: LOGO ─────────────────────────────────────────
  if (logo && logo.naturalWidth) {
    // Dimensiones originales del logo (aprox 1080x810 px)
    // Lo centramos en zona inferior, ~400px de alto con transparencia
    const logoH = 420;
    const logoW = Math.round(logo.naturalWidth * logoH / logo.naturalHeight);
    const logoX = Math.round((W - logoW) / 2);
    const logoY = H - logoH - 80;

    // Oscurecemos el fondo bajo el logo para que resalte menos el background del png
    const bgFade = ctx.createLinearGradient(0, logoY - 40, 0, logoY + logoH + 80);
    bgFade.addColorStop(0, 'rgba(13,31,78,0)');
    bgFade.addColorStop(0.3, 'rgba(13,31,78,0.18)');
    bgFade.addColorStop(1, 'rgba(13,31,78,0.35)');
    ctx.fillStyle = bgFade;
    ctx.fillRect(0, logoY - 40, W, logoH + 120);

    // Dibujamos el logo con opacidad reducida para integrarlo
    ctx.globalAlpha = 0.82;
    // Aplicamos tinte azul-oscuro multiplicando sobre el logo
    // Dibujamos primero el logo normal
    ctx.drawImage(logo, logoX, logoY, logoW, logoH);
    ctx.globalAlpha = 1;

    // Overlay de color frío para quitar el fondo gris del logo y fundirlo
    ctx.globalCompositeOperation = 'multiply';
    const tint = ctx.createRadialGradient(W/2, logoY + logoH*0.45, 0, W/2, logoY + logoH*0.45, logoW*0.55);
    tint.addColorStop(0, 'rgba(13,31,78,0.0)');
    tint.addColorStop(0.6,'rgba(13,31,78,0.45)');
    tint.addColorStop(1,  'rgba(13,31,78,0.85)');
    ctx.fillStyle = tint;
    ctx.fillRect(logoX - 20, logoY - 20, logoW + 40, logoH + 40);
    ctx.globalCompositeOperation = 'source-over';

  } else {
    // Fallback sin logo: texto tenue
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(150,170,220,0.40)';
    ctx.font = '700 28px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('@BET_DATA_SCIENCE', W/2, H - 100);
  }

  return canvas;
}

// ── HELPERS ──────────────────────────────────────────────────

function drawBrand(ctx, cx, y, fontSize) {
  ctx.font = `900 ${fontSize}px "Segoe UI", system-ui, sans-serif`;
  const parts = [
    { text: 'BET_',    color: 'white' },
    { text: 'DATA_',   color: '#60a5fa' },
    { text: 'SCIENCE', color: 'white' }
  ];
  const full = parts.map(p => p.text).join('');
  const totalW = ctx.measureText(full).width;
  let x = cx - totalW / 2;
  ctx.textAlign = 'left';
  parts.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, x, y);
    x += ctx.measureText(p.text).width;
  });
  ctx.textAlign = 'center';
}

function drawPill(ctx, cx, cy, text, colorA, colorB, textColor, fontSize, height, minWidth) {
  ctx.font = `800 ${fontSize}px "Segoe UI", system-ui, sans-serif`;
  const tw  = ctx.measureText(text).width;
  const pw  = Math.max(minWidth, tw + 80);
  const ph  = height;
  const px  = cx - pw/2, py = cy - ph/2;
  const r   = ph/2;
  const grad = ctx.createLinearGradient(px, py, px+pw, py);
  grad.addColorStop(0, colorA); grad.addColorStop(1, colorB);
  ctx.fillStyle = grad;
  roundRect(ctx, px, py, pw, ph, r); ctx.fill();
  ctx.fillStyle = textColor; ctx.textAlign = 'center';
  ctx.fillText(text, cx, cy + fontSize*0.36);
}

function drawTeamBox(ctx, x, y, w, h, name, reverse) {
  // Caja blanca
  ctx.fillStyle = 'white';
  roundRect(ctx, x, y, w, h, 20); ctx.fill();

  // Círculo escudo placeholder
  const circR = 44;
  const circX = reverse ? x + w - 28 - circR : x + 28 + circR;
  const circY = y + h/2;
  const cg = ctx.createRadialGradient(circX, circY, 0, circX, circY, circR);
  cg.addColorStop(0, '#dbeafe'); cg.addColorStop(1, '#bfdbfe');
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.arc(circX, circY, circR, 0, Math.PI*2); ctx.fill();

  // Iniciales
  const initials = name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
  ctx.fillStyle = '#1e40af'; ctx.font = '900 26px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.fillText(initials, circX, circY + 9);

  // Nombre equipo
  const maxW  = w - circR*2 - 80;
  const nameT = name.toUpperCase();
  ctx.textAlign = reverse ? 'right' : 'left';
  const nameX = reverse ? x + w - circR*2 - 44 : x + circR*2 + 44;
  let fs = 26;
  ctx.font = `900 ${fs}px "Segoe UI", system-ui, sans-serif`;
  while (ctx.measureText(nameT).width > maxW && fs > 14) {
    fs--; ctx.font = `900 ${fs}px "Segoe UI", system-ui, sans-serif`;
  }
  ctx.fillStyle = '#0f172a';
  ctx.fillText(nameT, nameX, y + h/2 + 9);
  ctx.textAlign = 'center';
}

function drawVsBadge(ctx, cx, cy, r) {
  ctx.fillStyle = '#1a3a80';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(100,150,255,0.3)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'white'; ctx.font = `900 26px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center'; ctx.fillText('VS', cx, cy + 9);
}

function drawInfoBox(ctx, x, y, w, h, label, value, valueColor, valueFontSize) {
  // Fondo
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, x, y, w, h, 20); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1.5;
  roundRect(ctx, x, y, w, h, 20); ctx.stroke();

  // Label
  ctx.textAlign = 'center';
  ctx.fillStyle = '#94a3b8'; ctx.font = '700 22px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(label, x + w/2, y + 46);

  // Valor — ajustar tamaño si no cabe
  let fs = valueFontSize;
  ctx.font = `900 ${fs}px "Segoe UI", system-ui, sans-serif`;
  while (ctx.measureText(value).width > w - 24 && fs > 18) {
    fs -= 2; ctx.font = `900 ${fs}px "Segoe UI", system-ui, sans-serif`;
  }
  // Texto largo del mercado → dividir en dos líneas
  if (label === 'MERCADO' && ctx.measureText(value).width > w - 24) {
    const words = value.split(' ');
    const mid = Math.ceil(words.length/2);
    const l1 = words.slice(0, mid).join(' ');
    const l2 = words.slice(mid).join(' ');
    ctx.fillStyle = valueColor;
    ctx.fillText(l1, x + w/2, y + h/2 + 4);
    ctx.fillText(l2, x + w/2, y + h/2 + fs + 8);
  } else {
    ctx.fillStyle = valueColor;
    ctx.fillText(value, x + w/2, y + h/2 + fs*0.38 + 10);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y,   x+w, y+r);
  ctx.lineTo(x+w,   y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r,   y+h); ctx.quadraticCurveTo(x,   y+h, x,   y+h-r);
  ctx.lineTo(x,     y+r); ctx.quadraticCurveTo(x,   y,   x+r, y);
  ctx.closePath();
}

function formatFecha(str) {
  if (!str) return '';
  const p = str.split('/');
  if (p.length < 3) return str;
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const d = new Date(p[2], p[1]-1, p[0]);
  return `${dias[d.getDay()]} ${p[0]} de ${meses[d.getMonth()]} de ${p[2]}`;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
  return lines.slice(1).map(line => {
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (values[i] || '').replace(/"/g,'').trim());
    return obj;
  });
}
